<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Snabb översättning för skola</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

textarea{
width:100%;
height:120px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
}

.qrgrid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:25px;
margin-top:30px;
}

.card{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

.lang{
font-weight:bold;
margin-bottom:10px;
}
</style>

</head>

<body>

<h2>Skolöversättare</h2>

<p>Skriv text på svenska:</p>

<textarea id="text"></textarea>

<h3>Extra språk</h3>

<label><input type="checkbox" value="Arabic"> Arabiska</label><br>
<label><input type="checkbox" value="Somali"> Somaliska</label><br>
<label><input type="checkbox" value="Tigrinya"> Tigrinja</label><br>
<label><input type="checkbox" value="Dari"> Dari</label><br>
<label><input type="checkbox" value="Persian"> Persiska</label><br>
<label><input type="checkbox" value="Turkish"> Turkiska</label><br>

<br>

<button onclick="translate()">Översätt</button>

<div id="results" class="qrgrid"></div>

<script src="script.js"></script>

</body>
</html>
