<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Skolöversättare</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<h1>Skolöversättare</h1>

<label>Favoriter</label>
<select id="favorites"></select>

<textarea id="text" placeholder="Skriv svensk text här"></textarea>

<div class="buttons">
<button onclick="translate()">Översätt</button>
<button onclick="saveFavorite()">⭐ Spara favorit</button>
<button onclick="printQR()">🖨 QR-ark</button>
</div>

<h3>Extra språk</h3>

<div class="languages">

<label><input type="checkbox" value="Arabic"> Arabiska</label>
<label><input type="checkbox" value="Somali"> Somaliska</label>
<label><input type="checkbox" value="Tigrinya"> Tigrinja</label>
<label><input type="checkbox" value="Dari"> Dari</label>
<label><input type="checkbox" value="Persian"> Persiska</label>
<label><input type="checkbox" value="Turkish"> Turkiska</label>

</div>

<div id="results" class="qrgrid"></div>

<script src="script.js"></script>

</body>
</html>
