<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        display: flex;
        justify-content: center;
        padding-top: 60px;
      }

      .card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        width: 320px;
      }

      h2 {
        margin-top: 0;
        text-align: center;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
      }

      button:hover {
        background: #357ab8;
      }

      #status {
        margin-top: 10px;
        text-align: center;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Skriv nytt ord</h2>

      <input type="text" id="name" placeholder="Ditt namn">
      <input type="text" id="word" placeholder="Skriv ett ord">

      <button onclick="save()">Spara</button>

      <div id="status"></div>
    </div>

    <script>
      function save() {
        const name = document.getElementById("name").value;
        const word = document.getElementById("word").value;

        document.getElementById("status").innerText = "Sparar...";

        google.script.run
          .withSuccessHandler(function(response) {
            document.getElementById("status").innerText = "✔ " + response;
            document.getElementById("word").value = "";
          })
          .withFailureHandler(function(error) {
            document.getElementById("status").innerText = "❌ " + error.message;
          })
          .saveWord(name, word);
      }
    </script>
  </body>
</html>
