<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Översättning</title>

<style>

body{

font-family:Helvetica;
text-align:center;
margin-top:80px;
padding:20px;

}

.text{

font-size:26px;
max-width:700px;
margin:auto;
line-height:1.5;

}

</style>

</head>

<body>

<div id="text" class="text"></div>

<script>

const supabase="https://nyqxplfhrzydxnwhvhco.supabase.co"

const anon="DIN_SUPABASE_ANON_KEY"

const params=new URLSearchParams(location.search)

const id=params.get("id")

fetch(`${supabase}/rest/v1/translations?id=eq.${id}&select=translation`,{

headers:{
apikey:anon,
Authorization:`Bearer ${anon}`
}

})

.then(r=>r.json())
.then(d=>{

document.getElementById("text").innerText=d[0].translation

})

</script>

</body>
</html>
