<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Översättning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 15px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .language {
      color: #667eea;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    .translation {
      background: #f8f9ff;
      padding: 20px;
      border-radius: 10px;
      font-size: 18px;
      line-height: 1.6;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 2px solid #e0e0e0;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }

    .copy-btn {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .copy-btn:hover {
      transform: translateY(-2px);
    }

    .copy-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="language" id="language">Översättning</div>
    <div class="translation" id="translation">Laddar...</div>
    <button class="copy-btn" onclick="copyText()">Kopiera text</button>
    <div class="footer">Skapad med Översättningsappen</div>
  </div>

  <script>
    // Läs parametrar från URL
    const params = new URLSearchParams(window.location.search)
    const lang = params.get('lang') || 'Okänt språk'
    const text = params.get('text') || 'Ingen text tillgänglig'

    // Visa innehållet
    document.getElementById('language').innerText = lang
    document.getElementById('translation').innerText = decodeURIComponent(text)

    function copyText() {
      const text = document.getElementById('translation').innerText
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn')
        btn.innerText = '✓ Kopierat!'
        btn.style.background = '#10b981'
        setTimeout(() => {
          btn.innerText = 'Kopiera text'
          btn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
        }, 2000)
      })
    }
  </script>
</body>
</html>
