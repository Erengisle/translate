<!DOCTYPE html>
<html lang="sv">
<head>

<meta charset="UTF-8">

<title>Översättning</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:80px;
padding:20px;
}

.lang{
font-size:28px;
margin-bottom:30px;
}

.text{
font-size:24px;
max-width:700px;
margin:auto;
line-height:1.5;
}

</style>

</head>

<body>

<div class="lang" id="lang"></div>

<div class="text" id="text"></div>

<script>

const params = new URLSearchParams(location.search);

document.getElementById("lang").innerText=params.get("lang");

document.getElementById("text").innerText=params.get("text");

</script>

</body>
</html>
